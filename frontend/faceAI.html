<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Face & Emotion Detection</title>

  <!-- Load face-api FIRST -->
  <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #videoContainer {
      position: relative;
      width: 720px;
      margin: 20px auto;
    }

    video {
      width: 720px;
      height: 560px;
      background: black;
      border-radius: 10px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #status {
      margin-top: 10px;
      color: #38bdf8;
    }
  </style>
</head>

<body>
  <h1>Face & Emotion Detection</h1>
  <p>Real-time face detection with emotion analysis</p>

  <div id="videoContainer">
    <video id="video" autoplay muted></video>
  </div>

  <div id="status">Loading models...</div>

  <script>
    window.onload = async () => {
      if (!window.faceapi) {
        document.getElementById("status").innerText =
          "face-api.js failed to load (check internet connection)";
        return;
      }

      const video = document.getElementById("video");
      const statusText = document.getElementById("status");
      const MODEL_URL = "/models";

      try {
        await Promise.all([
          faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
          faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL)
        ]);

        statusText.innerText = "Models loaded. Starting camera...";
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
      } catch (err) {
        console.error(err);
        statusText.innerText = "Model or camera error. Check console.";
        return;
      }

      video.addEventListener("playing", () => {
        statusText.innerText = "Detecting faces...";

        const canvas = faceapi.createCanvasFromMedia(video);
        document.getElementById("videoContainer").append(canvas);

        const displaySize = {
          width: video.videoWidth,
          height: video.videoHeight
        };

        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
          const detections = await faceapi
            .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceExpressions();

          const resized = faceapi.resizeResults(detections, displaySize);
          const ctx = canvas.getContext("2d");
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          faceapi.draw.drawDetections(canvas, resized);
          faceapi.draw.drawFaceExpressions(canvas, resized);
        }, 150);
      });
    };
  </script>
</body>
</html>
